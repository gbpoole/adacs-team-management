{% extends "base.html" %}

{% load i18n %}

{% block body %}
  {% include 'elements/navbar.html' %}
  {% if messages %}
    {% for message in messages %}
      <div class="alert {% if message.tags %}alert-{{ message.tags }}{% endif %}">{{ message|linebreaksbr }}</div>
    {% endfor %}
  {% endif %}
  <div class="flex justify-center px-6 py-8">
    <div class="w-full max-w-md">
      <div class="mb-4">
        <a href="{{ request.user.get_absolute_url }}"
           class="btn btn-ghost btn-sm">← {% trans "My Profile" %}</a>
      </div>
      {% block content %}
      {% endblock content %}
    </div>
  </div>
{% endblock body %}
