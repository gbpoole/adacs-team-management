{% load allauth %}

<section>
  <div>
    <div>
      <h2>
        {% slot title %}
        {% endslot %}
      </h2>
      {% slot body %}
      {% endslot %}
      {% if slots.actions %}
        <ul>
          {% for action in slots.actions %}<li>{{ action }}</li>{% endfor %}
        </ul>
      {% endif %}
    </div>
  </div>
</section>
