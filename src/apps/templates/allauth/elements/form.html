{% load allauth %}

{% for err in attrs.form.non_field_errors %}<div class="alert alert-error mb-3">{{ err }}</div>{% endfor %}
<form class="{% block form_class %}{% if not attrs.no_visible_fields %}space-y-2{% endif %}{% endblock %}"
      method="{{ attrs.method }}"
      action="{{ attrs.action }}">
  {% slot body %}{% endslot %}
  <div class="flex flex-wrap gap-2 mt-4">{% slot actions %}{% endslot %}</div>
</form>
