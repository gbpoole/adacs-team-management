version: '3'

services:
  django:
    build:
      context: .
      target: runner
    container_name: adacs_team_planning_django
    env_file: .env
    ports:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    restart: unless-stopped

  nginx:
    build:
      context: .
      target: nginx
    container_name: adacs_team_planning_static
    ports:
      - "8000:8000"
    depends_on:
      - django
    restart: unless-stopped

  db:
    image: mysql:8.4.3
    container_name: adacs_team_planning_mysql
    env_file: .env
    volumes:
      - ./db:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: "/usr/bin/mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute \"SHOW DATABASES;\""
      interval: 2s
      timeout: 20s
      retries: 10
      start_period: 20s

  cron:
    build:
      context: .
      target: cron
    env_file: .env
    container_name: adacs_team_planning_mailbox_cron
    depends_on:
      - django
      - db
    restart: unless-stopped

