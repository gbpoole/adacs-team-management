services:
  django:
    build:
      context: .
      target: runner
    container_name: adacs_team_management_django
    env_file: .env
    ports:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    build:
      context: .
      target: nginx
    container_name: adacs_team_management_static
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      django:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: mysql:8.4.3
    container_name: adacs_team_management_mysql
    env_file: .env
    volumes:
      - ./db:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: "/usr/bin/mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute \"SHOW DATABASES;\""
      interval: 2s
      timeout: 20s
      retries: 10
      start_period: 20s

  mailpit:
    image: axllent/mailpit
    container_name: adacs_team_management_mailpit
    ports:
      - "127.0.0.1:8026:8025"
    restart: unless-stopped

  cron:
    build:
      context: .
      target: cron
    env_file: .env
    container_name: adacs_team_management_mailbox_cron
    depends_on:
      django:
        condition: service_healthy
        restart: true
      db:
        condition: service_healthy
        restart: true
      mailpit:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x cron > /dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
